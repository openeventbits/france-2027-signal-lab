name: Update polls

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: production-data-update
  cancel-in-progress: false

jobs:
  update-polls:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check pandas lxml pypdf

      - name: Test first-round polling contract
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -B -m unittest -v test_fetch_polls.py test_frontend_facts.py

      - name: Fetch polls into temporary files
        run: |
          python fetch_polls.py \
            --output /tmp/polls.json \
            --second-round-output /tmp/second_round_polls.json \
            --closest-runoff-output /tmp/closest_tested_runoff.json

      - name: Validate and stage fetched data
        id: validate
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from poll_contract import PollContractError, validate_poll_events

          current_path = Path("polls.json")
          fetched_path = Path("/tmp/polls.json")
          second_round_path = Path("second_round_polls.json")
          fetched_second_round_path = Path("/tmp/second_round_polls.json")
          closest_path = Path("closest_tested_runoff.json")
          fetched_closest_path = Path("/tmp/closest_tested_runoff.json")

          current = json.loads(current_path.read_text(encoding="utf-8"))
          current_second_round = json.loads(
              second_round_path.read_text(encoding="utf-8")
          )
          current_closest = json.loads(
              closest_path.read_text(encoding="utf-8")
          )
          fetched = json.loads(fetched_path.read_text(encoding="utf-8"))
          second_round = json.loads(
              fetched_second_round_path.read_text(encoding="utf-8")
          )
          closest = json.loads(
              fetched_closest_path.read_text(encoding="utf-8")
          )

          if not isinstance(current, list) or not isinstance(fetched, list):
              raise SystemExit("polls data must be a JSON list")

          if not fetched:
              raise SystemExit("refusing to replace polls.json with an empty dataset")

          try:
              contract_counts = validate_poll_events(fetched)
          except PollContractError as error:
              raise SystemExit(f"invalid first-round poll contract: {error}")

          if len(fetched) < len(current):
              raise SystemExit(
                  f"refusing dataset shrink: {len(current)} -> {len(fetched)} events"
              )

          required = {
              "event_id",
              "pollster",
              "fieldwork_start",
              "fieldwork_end",
              "round",
              "scenario_key",
              "source_url",
              "candidates",
          }

          event_ids = set()
          source_urls = set()

          for index, event in enumerate(fetched):
              missing = required - event.keys()

              if missing:
                  raise SystemExit(
                      f"event {index} missing fields: {sorted(missing)}"
                  )

              if event["event_id"] in event_ids:
                  raise SystemExit(
                      f"duplicate event_id: {event['event_id']}"
                  )

              event_ids.add(event["event_id"])
              source_urls.add(event["source_url"])

              if event["round"] != "first_round":
                  raise SystemExit(f"unexpected round in event {index}")

              if (
                  not isinstance(event["candidates"], list)
                  or len(event["candidates"]) < 2
              ):
                  raise SystemExit(
                      f"event {index} has fewer than two candidates"
                  )

          required_notices = {
              "https://www.commission-des-sondages.fr/notices/medias/fichiers/add/2166",
              "https://www.commission-des-sondages.fr/notices/medias/fichiers/add/2197",
              "https://www.commission-des-sondages.fr/notices/medias/fichiers/add/2216",
          }
          missing_notices = required_notices - source_urls
          if missing_notices:
              raise SystemExit(
                  "missing configured Commission notices: "
                  f"{sorted(missing_notices)}"
              )

          official_waves = {
              ("Elabe", "2026-03-25", "2026-03-27"): (
                  "https://www.commission-des-sondages.fr/notices/medias/fichiers/add/2166",
                  6,
              ),
              ("Ipsos", "2026-05-27", "2026-05-28"): (
                  "https://www.commission-des-sondages.fr/notices/medias/fichiers/add/2197",
                  8,
              ),
              ("Ifop", "2026-06-22", "2026-06-24"): (
                  "https://www.commission-des-sondages.fr/notices/medias/fichiers/add/2216",
                  8,
              ),
          }
          for (pollster, start, end), (notice_url, expected_count) in (
              official_waves.items()
          ):
              wave_events = [
                  event
                  for event in fetched
                  if event["pollster"] == pollster
                  and event["fieldwork_start"] == start
                  and event["fieldwork_end"] == end
              ]
              if len(wave_events) != expected_count:
                  raise SystemExit(
                      f"{pollster} {start} to {end}: expected "
                      f"{expected_count} events, found {len(wave_events)}"
                  )
              if any(
                  event["source_url"] != notice_url for event in wave_events
              ):
                  raise SystemExit(
                      f"{pollster} {start} to {end}: non-notice source remains"
                  )

          bardella_latest = max(
              (
                  event["fieldwork_end"]
                  for event in fetched
                  if any(
                      candidate.get("name") == "Jordan Bardella"
                      for candidate in event["candidates"]
                  )
              ),
              default="",
          )
          if bardella_latest < "2026-06-24":
              raise SystemExit(
                  "Jordan Bardella latest fieldwork end is too old: "
                  f"{bardella_latest or 'missing'}"
              )

          current_latest = max(
              (event["fieldwork_end"] for event in current),
              default="",
          )
          fetched_latest = max(
              event["fieldwork_end"] for event in fetched
          )

          if fetched_latest < current_latest:
              raise SystemExit(
                  "refusing older latest fieldwork date: "
                  f"{current_latest} -> {fetched_latest}"
              )

          second_events = (
              second_round.get("events")
              if isinstance(second_round, dict)
              else None
          )
          if (
              not isinstance(second_round, dict)
              or second_round.get("schema_version") != "1.0"
              or not isinstance(second_events, list)
              or not second_events
          ):
              raise SystemExit("invalid second-round output contract")
          if any(
              event.get("round") != "second_round"
              or len(event.get("candidates", [])) != 2
              or not str(event.get("source_url", "")).startswith(
                  ("http://", "https://")
              )
              for event in second_events
          ):
              raise SystemExit("invalid second-round event")

          if not isinstance(closest, dict) or closest.get("status") not in {
              "agree",
              "split",
              "ambiguous",
              "insufficient",
          }:
              raise SystemExit("invalid closest-runoff output contract")
          if closest.get("source") != second_round.get("source"):
              raise SystemExit("generated source attribution does not match")
          if closest["status"] == "agree" and not closest.get(
              "selected_matchup"
          ):
              raise SystemExit("agree status lacks selected matchup")

          def semantic_payload(value):
              if not isinstance(value, dict):
                  return value
              return {
                  key: item
                  for key, item in value.items()
                  if key != "generated_at"
              }

          changed = (
              fetched != current
              or semantic_payload(second_round)
              != semantic_payload(current_second_round)
              or semantic_payload(closest)
              != semantic_payload(current_closest)
          )

          with Path(os.environ["GITHUB_OUTPUT"]).open(
              "a", encoding="utf-8"
          ) as output:
              output.write(f"changed={str(changed).lower()}\n")

          if not changed:
              print(
                  "No semantic poll or runoff change was detected; "
                  "generated_at is ignored."
              )
              raise SystemExit(0)

          current_path.write_bytes(fetched_path.read_bytes())
          second_round_path.write_bytes(fetched_second_round_path.read_bytes())
          closest_path.write_bytes(fetched_closest_path.read_bytes())

          print(
              f"Validated {len(fetched)} first-round and "
              f"{len(second_events)} second-round events; "
              f"{contract_counts['complete']} complete and "
              f"{contract_counts['partial']} partial first-round events; "
              f"closest-runoff status {closest['status']}; "
              f"latest first-round fieldwork end {fetched_latest}"
          )
          PY

      - name: Regenerate Recent Changes Ledger
        if: steps.validate.outputs.changed == 'true'
        run: |
          python generate_recent_changes.py \
            --news news_wire.json \
            --polls polls.json \
            --runoff closest_tested_runoff.json \
            --second-round second_round_polls.json \
            --claims claims_under_scrutiny.json \
            --output recent_changes.json

      - name: Rebuild and validate publication manifest
        if: steps.validate.outputs.changed == 'true'
        shell: bash
        run: |
          published_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          python -B build_publication_manifest.py \
            --published-at "$published_at"
          python -B build_publication_manifest.py \
            --check \
            --published-at "$published_at"

      - name: Commit changed poll data
        id: commit
        env:
          POLL_DATA_CHANGED: ${{ steps.validate.outputs.changed }}
        shell: bash
        run: |
          if [ "$POLL_DATA_CHANGED" != "true" ]; then
            echo "No poll changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- \
            polls.json second_round_polls.json closest_tested_runoff.json \
            recent_changes.json publication_manifest.json
          git commit -m "Update polls data"
          git push origin HEAD:main

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Request GitHub Pages rebuild
        if: steps.commit.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            --header "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/pages/builds"
