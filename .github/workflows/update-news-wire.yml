name: Update Election News Wire

on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: production-data-update
  cancel-in-progress: false

jobs:
  update-news-wire:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run news pipeline tests
        run: python -m unittest

      - name: Build temporary rolling news outputs
        shell: bash
        run: |
          set -euo pipefail

          cp news_inventory.json /tmp/news_inventory.json
          cp source_health.json /tmp/source_health.json

          python fetch_news_wire.py \
            --polls polls.json \
            --inventory /tmp/news_inventory.json \
            --source-health /tmp/source_health.json \
            --output /tmp/news_wire.json \
            --window-days 30 \
            --max-items 0

          python generate_recent_changes.py \
            --news /tmp/news_wire.json \
            --polls polls.json \
            --runoff closest_tested_runoff.json \
            --second-round second_round_polls.json \
            --claims claims_under_scrutiny.json \
            --output /tmp/recent_changes.json \
            --previous recent_changes.json

      - name: Validate and promote generated data
        id: promote
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import shutil
          from pathlib import Path
          from typing import Any

          from fetch_news_wire import validate_output
          from source_health import (
              has_substantive_change,
              validate_source_health,
          )


          CURRENT_INVENTORY = Path("news_inventory.json")
          CURRENT_WIRE = Path("news_wire.json")
          CURRENT_LEDGER = Path("recent_changes.json")
          CURRENT_HEALTH = Path("source_health.json")

          TEMP_INVENTORY = Path("/tmp/news_inventory.json")
          TEMP_WIRE = Path("/tmp/news_wire.json")
          TEMP_LEDGER = Path("/tmp/recent_changes.json")
          TEMP_HEALTH = Path("/tmp/source_health.json")


          def fail(message: str) -> None:
              raise SystemExit(
                  f"Rolling News validation failed: {message}"
              )


          def load_json(path: Path) -> dict[str, Any]:
              try:
                  payload = json.loads(
                      path.read_text(encoding="utf-8")
                  )
              except (OSError, json.JSONDecodeError) as error:
                  fail(f"could not read {path}: {error}")

              if not isinstance(payload, dict):
                  fail(f"{path} is not a JSON object")

              return payload


          current_inventory = load_json(CURRENT_INVENTORY)
          current_wire = load_json(CURRENT_WIRE)
          current_ledger = load_json(CURRENT_LEDGER)
          current_health = load_json(CURRENT_HEALTH)

          inventory = load_json(TEMP_INVENTORY)
          wire = load_json(TEMP_WIRE)
          ledger = load_json(TEMP_LEDGER)
          health = load_json(TEMP_HEALTH)

          validate_output(wire)
          validate_source_health(current_health)
          validate_source_health(health)


          # Rolling inventory contract.
          if inventory.get("schema_version") != 3:
              fail("inventory schema_version must equal 3")

          inventory_items = inventory.get("items")

          if not isinstance(inventory_items, list):
              fail("inventory items must be an array")

          inventory_ids = [
              item.get("id")
              for item in inventory_items
              if isinstance(item, dict)
          ]

          if len(inventory_ids) != len(inventory_items):
              fail("inventory contains a malformed item")

          if (
              any(
                  not isinstance(item_id, str)
                  or not item_id.strip()
                  for item_id in inventory_ids
              )
              or len(inventory_ids) != len(set(inventory_ids))
          ):
              fail("inventory contains invalid or duplicate ids")


          # News Wire contract.
          required_wire_lists = (
              "relevant_news",
              "election_news",
              "notable_developments",
              "candidate_watch",
          )

          for list_name in required_wire_lists:
              if not isinstance(wire.get(list_name), list):
                  fail(f"{list_name} must be an array")

          counts = wire.get("counts")

          if not isinstance(counts, dict):
              fail("news-wire counts must be an object")

          for list_name in required_wire_lists:
              if counts.get(list_name) != len(wire[list_name]):
                  fail(
                      f"counts.{list_name} does not match "
                      f"the {list_name} array"
                  )

          sources = wire.get("sources")

          if not isinstance(sources, list) or len(sources) != 19:
              fail("exactly 19 news source records are required")

          successful_sources = sum(
              isinstance(source, dict)
              and source.get("status") == "ok"
              for source in sources
          )

          if successful_sources < 4:
              fail(
                  "fewer than four publisher feeds succeeded"
              )

          if counts.get("successful_sources") != successful_sources:
              fail(
                  "successful source count does not match statuses"
              )

          relevant_ids = {
              item.get("id")
              for item in wire["relevant_news"]
              if isinstance(item, dict)
          }
          election_ids = {
              item.get("id")
              for item in wire["election_news"]
              if isinstance(item, dict)
          }
          notable_ids = {
              item.get("id")
              for item in wire["notable_developments"]
              if isinstance(item, dict)
          }

          if not election_ids.issubset(relevant_ids):
              fail(
                  "election_news is not a subset of relevant_news"
              )

          if not notable_ids.issubset(relevant_ids):
              fail(
                  "notable_developments is not a subset "
                  "of relevant_news"
              )

          agenda = wire.get("campaign_agenda")

          if not isinstance(agenda, dict):
              fail("campaign_agenda must be an object")

          if (
              agenda.get("method")
              != "accepted_relevant_news_by_campaign_theme"
          ):
              fail("campaign_agenda method is unsupported")

          if (
              agenda.get("input_item_count")
              != len(wire["relevant_news"])
          ):
              fail(
                  "campaign_agenda input count does not match "
                  "relevant_news"
              )

          if not isinstance(agenda.get("topics"), list):
              fail("campaign_agenda topics must be an array")


          # Recent Changes contract.
          ledger_items = ledger.get("items")
          ledger_counts = ledger.get("counts")

          if not isinstance(ledger_items, list):
              fail("recent changes items must be an array")

          if not isinstance(ledger_counts, dict):
              fail("recent changes counts must be an object")

          if ledger_counts.get("total") != len(ledger_items):
              fail(
                  "recent changes total does not match its items"
              )


          # Ignore timestamps and fetch timing when deciding whether
          # the public outputs have changed.
          volatile_keys = {
              "generated_at",
              "detected_at",
              "response_seconds",
          }


          def scrub(value: Any) -> Any:
              if isinstance(value, dict):
                  return {
                      key: scrub(item)
                      for key, item in value.items()
                      if key not in volatile_keys
                  }

              if isinstance(value, list):
                  return [scrub(item) for item in value]

              return value


          def wire_projection(
              payload: dict[str, Any],
          ) -> dict[str, Any]:
              payload_counts = payload.get("counts", {})
              feed_coverage = payload.get("feed_coverage", {})

              return {
                  "candidate_roster": payload.get(
                      "candidate_roster"
                  ),
                  "window_days": payload.get("window_days"),
                  "source_status": [
                      {
                          "name": source.get("name"),
                          "status": source.get("status"),
                      }
                      for source in payload.get("sources", [])
                      if isinstance(source, dict)
                  ],
                  "counts": {
                      key: payload_counts.get(key)
                      for key in (
                          "successful_sources",
                          "retained_inventory_items",
                          "election_news",
                          "notable_developments",
                          "relevant_news",
                          "candidate_watch",
                      )
                  },
                  "campaign_agenda": payload.get(
                      "campaign_agenda"
                  ),
                  # Persist semantic feed-registry changes without
                  # committing hourly due/success timing fluctuations.
                  "feed_coverage_configuration": {
                      key: feed_coverage.get(key)
                      for key in (
                          "configured_feeds",
                          "direct_feeds",
                          "shared_discovery_feeds",
                          "publisher_site_feeds",
                          "configured_media_publishers",
                      )
                  },
                  "relevant_news": payload.get(
                      "relevant_news"
                  ),
                  "election_news": payload.get(
                      "election_news"
                  ),
                  "notable_developments": payload.get(
                      "notable_developments"
                  ),
                  "candidate_watch": payload.get(
                      "candidate_watch"
                  ),
              }


          inventory_changed = (
              current_inventory != inventory
          )
          wire_changed = (
              scrub(wire_projection(current_wire))
              != scrub(wire_projection(wire))
          )
          ledger_changed = (
              scrub(current_ledger) != scrub(ledger)
          )
          health_changed = has_substantive_change(
              current_health,
              health,
          )

          changed = (
              inventory_changed
              or wire_changed
              or ledger_changed
              or health_changed
          )

          if changed:
              shutil.copyfile(
                  TEMP_INVENTORY,
                  CURRENT_INVENTORY,
              )
              shutil.copyfile(
                  TEMP_WIRE,
                  CURRENT_WIRE,
              )
              shutil.copyfile(
                  TEMP_LEDGER,
                  CURRENT_LEDGER,
              )
              shutil.copyfile(
                  TEMP_HEALTH,
                  CURRENT_HEALTH,
              )

          output_path = Path(os.environ["GITHUB_OUTPUT"])

          with output_path.open("a", encoding="utf-8") as output:
              output.write(
                  f"changed={str(changed).lower()}\n"
              )

          print(
              "Rolling inventory: "
              f"{len(inventory_items)} items"
          )
          print(
              "Relevant News: "
              f"{len(wire['relevant_news'])}"
          )
          print(
              "Election News: "
              f"{len(wire['election_news'])}"
          )
          print(
              "Candidate Watch: "
              f"{len(wire['candidate_watch'])}"
          )
          print(
              "Recent Changes: "
              f"{len(ledger_items)}"
          )
          print(
              "Feeds ready: "
              f"{successful_sources}/{len(sources)}"
          )
          print(
              "Changes detected: "
              f"inventory={inventory_changed}, "
              f"wire={wire_changed}, "
              f"ledger={ledger_changed}, "
              f"source_health={health_changed}"
          )
          PY

      - name: Rebuild and validate publication manifest
        if: steps.promote.outputs.changed == 'true'
        shell: bash
        run: |
          published_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          python -B build_publication_manifest.py \
            --published-at "$published_at"
          python -B build_publication_manifest.py \
            --check \
            --published-at "$published_at"

      - name: Commit changed rolling news data
        id: commit
        if: steps.promote.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- \
            news_inventory.json \
            news_wire.json \
            recent_changes.json \
            source_health.json \
            publication_manifest.json

          if git diff --cached --quiet; then
            echo "No staged data change was detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Update rolling election news data"

          target_branch="${GITHUB_REF_NAME:-main}"

          git fetch origin "$target_branch"
          git rebase "origin/$target_branch"
          git push origin "HEAD:$target_branch"

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Request GitHub Pages rebuild
        if: steps.commit.outputs.changed == 'true' && github.ref_name == 'main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          curl \
            --fail-with-body \
            --location \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            --header "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/pages/builds"
